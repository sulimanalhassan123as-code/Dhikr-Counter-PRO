<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhikr Counter PRO</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0c3b2e">
<meta name="description" content="Motivational Dhikr Counter with statistics and Ramadan mode">

<link rel="icon" href="icon-192.png">

</head>

<body>

<header class="header">
<h1>🌙 Dhikr Counter PRO</h1>
</header>

<!-- HOME DASHBOARD -->

<section id="home-screen">

<div class="dashboard">

<div class="card">
<h2>Today's Dhikr</h2>
<p id="today-count">0</p>
</div>

<div class="card">
<h2>🔥 Streak</h2>
<p id="streak">0 days</p>
</div>

<div class="card">
<h2>⭐ Level</h2>
<p id="level">Beginner</p>
</div>

</div>

<button id="start-btn" class="main-btn">Start Dhikr</button>

<h3>Community Dhikr Today</h3>

<ul id="leaderboard">
</ul>

</section>

<!-- COUNTER SCREEN -->

<section id="counter-screen">

<button id="back-btn">← Back</button>

<h2 id="dhikr-title"></h2>

<p id="dhikr-arabic"></p>
<p id="dhikr-meaning"></p>

<div id="counter-number">0</div>

<div class="progress-container">
<div id="progress-bar"></div>
</div>

<p id="target-text">/ 33</p>

<button id="tap-btn">Tap for Dhikr</button>

</section>

<!-- ROCKET REWARD -->

<div id="rocket">🚀</div>

<!-- AUDIO -->

<audio id="tasbih-sound" src="tasbih.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
