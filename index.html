<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhikr Counter PRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <meta name="description" content="Premium Dhikr Counter PRO with Tasbih, smart notifications, and advanced statistics.">
    <link rel="icon" href="icon-192.png">
</head>
<body>

    <div id="setup-screen" class="screen active">
        <header>
            <h1>🌙 Dhikr PRO</h1>
            <button id="dark-mode-toggle">🌙</button>
        </header>
        <main>
            
            <div class="statistics-glass-box">
                <div class="stat-item">
                    <span class="stat-label">Today</span>
                    <strong id="daily-stats">0</strong>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Streak</span>
                    <strong id="streak-stats">0 🔥</strong>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Lifetime</span>
                    <strong id="lifetime-stats">0</strong>
                </div>
            </div>
            <p id="daily-reminder" class="reminder-text"></p>

            <h2>Daily Dhikr</h2>
            <div class="preset-buttons">
                <button class="preset-btn" data-target="33" data-text="SubhanAllah">SubhanAllah (33)</button>
                <button class="preset-btn" data-target="33" data-text="Alhamdulillah">Alhamdulillah (33)</button>
                <button class="preset-btn" data-target="34" data-text="Allahu Akbar">Allahu Akbar (34)</button>
                <button class="preset-btn" data-target="100" data-text="Astaghfirullah">Astaghfirullah (100)</button>
            </div>

            <h2>Custom Target</h2>
            <div class="custom-target">
                <input type="number" id="custom-target-input" placeholder="e.g. 500">
                <button id="use-custom-btn" class="gold-btn">Start</button>
            </div>

        </main>
        <footer>
            <p>Powered by <strong>Suleiman Alhassan</strong></p>
        </footer>
    </div>

    <div id="counter-screen" class="screen">
        <div class="counter-header">
            <button id="reset-btn" class="icon-btn">← Back</button>
            <button id="lock-btn" class="icon-btn">🔓</button>
        </div>
        
        <p id="current-dhikr-text"></p>
        
        <div id="tap-area">
            <div class="tap-circle">
                <p id="count-display">0</p>
                <p id="target-display">/ 100</p>
            </div>
        </div>
        
        <div class="counter-footer">
            <button id="manual-reset-btn" class="danger-btn">Reset</button>
            <button id="share-btn" class="gold-btn">Share 💬</button>
        </div>
    </div>

    <a id="whatsapp-btn" href="https://wa.me/233599931348" target="_blank">💬</a>

    <audio id="tasbih-sound" src="tasbih.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
