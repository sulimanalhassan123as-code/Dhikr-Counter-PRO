<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Dhikr Counter PRO</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>🌙 Dhikr Counter PRO</h1>
</header>

<section id="dashboard">

<h2>Today's Dhikr</h2>
<p id="todayCount">0</p>

<h3 id="level">Level: Beginner</h3>

<h3 id="streak">🔥 Streak: 0</h3>

<button id="startBtn">Start Dhikr</button>

</section>

<section id="counterScreen">

<h2 id="dhikrTitle">SubhanAllah</h2>

<p id="arabic">سُبْحَانَ ٱللَّٰهِ</p>

<p id="meaning">Glory be to Allah</p>

<div id="count">0</div>

<div class="progress">
<div id="progressBar"></div>
</div>

<button id="tapBtn">Tap</button>

</section>

<section id="stats">

<canvas id="dhikrChart"></canvas>

</section>

<section id="assistant">

<h3>AI Assistant</h3>

<p id="aiMessage"></p>

</section>

<div id="rocket">🚀</div>

<audio id="sound" src="tasbih.mp3"></audio>

<script src="script.js"></script>
<script src="ai.js"></script>

</body>
</html>
